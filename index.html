<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div style="padding: 20px; font-family: serif; font-style: italic; opacity: 0.5;">
        Initialization in progress...
      </div>
    </div>
    <script type="text/javascript">
      // Check for IndexedDB support
      if (!window.indexedDB) {
        document.getElementById('root').innerHTML = '<div style="color: orange; padding: 20px; font-family: sans-serif;">' +
          '<strong>Warning:</strong> Your browser settings might be blocking IndexedDB, which is required for offline features. ' +
          'Please ensure you are not in a highly restricted private mode or check your browser permissions.' +
          '</div>';
      }

      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var message = [
          'Message: ' + msg,
          'URL: ' + url,
          'Line: ' + lineNo,
          'Column: ' + columnNo,
          'Error object: ' + JSON.stringify(error)
        ].join(' - ');
        console.log('CRITICAL ERROR:', message);
        document.getElementById('root').innerHTML = '<div style="color: red; padding: 20px; font-family: sans-serif;">' +
          '<strong>A critical error occurred during initialization:</strong><br>' +
          '<code style="font-size: 11px;">' + message + '</code>' +
          '</div>';
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
